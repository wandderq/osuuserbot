en:
  start: |
    <b>Welcome to osuuserbot!</b>

    I can display quick osu! player statistics.

    <b>How to use:</b>
    This bot works mainly in <b>inline mode</b>. Just type <code>@osuuserbot</code> followed by the osu! username in any chat.

    <i>Example:</i> <code>@osuuserbot peppy</code>

  about: |
